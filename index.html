<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Truck - Elite V3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2fe; --bg: #0a0c10; --card: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin: 0; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; width: 100%; max-width: 450px; backdrop-filter: blur(10px); box-sizing: border-box; text-align: center; }
        video { width: 100%; border-radius: 15px; background: #000; margin-bottom: 10px; border: 1px solid #333; }
        button { background: linear-gradient(45deg, #00f2fe, #4facfe); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; color: #000; font-size: 1rem; }
        .btn-sec { background: transparent; border: 1px solid var(--neon); color: var(--neon); margin-top: 8px; }
        .post { background: rgba(255,255,255,0.03); border-left: 4px solid var(--neon); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; width: 100%; box-sizing: border-box; }
        .hidden { display: none !important; }
        .nav-pfp { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); cursor: pointer; }
    </style>
</head>
<body>

    <div id="view-scanner" class="container hidden">
        <img id="nav-pfp" class="nav-pfp" src="https://www.gravatar.com/avatar/0?d=mp" onclick="setProfile()">
        <div class="card">
            <h2 style="color:var(--neon); margin:0 0 15px 0;">INFO TRUCK ELITE</h2>
            <video id="vid" autoplay playsinline></video>
            <canvas id="canvas-proc" class="hidden"></canvas>
            
            <button onclick="processSource('camera')">📸 ESCANEAR EN VIVO</button>
            
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="processSource('file')">
            <button class="btn-sec" onclick="document.getElementById('fileInput').click()">📁 SUBIR DE GALERÍA</button>
            
            <p id="st" style="font-size: 0.8rem; color: #888; margin-top: 15px;">Listo con OCR.space, we.</p>
        </div>
    </div>

    <div id="view-pc" class="container hidden">
        <div class="card" style="max-width: 600px;">
            <h2 style="color:var(--neon); margin-top:0;">RECEPCIÓN</h2>
            <div id="feed"><p style="color: #444;">Esperando...</p></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://dopmsepmgmcncpymkeey.supabase.co';
        const SB_KEY = 'sb_publishable_DQuJP12R60iDQCFtyW8xNQ_2i3HLC5x';
        const OCR_KEY = 'K85992362288957'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const isPC = urlParams.get('mode') === 'pc';
        let user = JSON.parse(localStorage.getItem('it_user') || '{"alias":"User","pfp":"https://www.gravatar.com/avatar/0?d=mp"}');

        if (isPC) {
            document.getElementById('view-pc').classList.remove('hidden');
            initRealtime();
        } else {
            document.getElementById('view-scanner').classList.remove('hidden');
            document.getElementById('nav-pfp').src = user.pfp;
            startCamera();
        }

        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('vid').srcObject = s;
            } catch (e) { alert("Activa la cámara."); }
        }

        function getProcessedDataUrl(source) {
            const canvas = document.getElementById('canvas-proc');
            const ctx = canvas.getContext('2d');
            canvas.width = source.videoWidth || source.width;
            canvas.height = source.videoHeight || source.height;
            ctx.drawImage(source, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        async function processSource(type) {
            const st = document.getElementById('st');
            st.innerText = "⚡ PROCESANDO...";
            
            let dataUrl;
            if (type === 'camera') {
                dataUrl = getProcessedDataUrl(document.getElementById('vid'));
            } else {
                const file = document.getElementById('fileInput').files[0];
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await img.decode();
                dataUrl = getProcessedDataUrl(img);
            }

            st.innerText = "📡 USANDO IA...";
            
            try {
                const fd = new FormData();
                fd.append('base64Image', dataUrl);
                fd.append('apikey', OCR_KEY);
                fd.append('language', 'spa');
                fd.append('isTable', 'true'); // Ayuda a que entienda mejor el orden de las letras

                const resp = await fetch('https://api.ocr.space/parse/image', {
                    method: 'POST',
                    body: fd
                });

                const res = await resp.json();

                if (res.OCRExitCode === 1) {
                    const txt = res.ParsedResults[0].ParsedText;
                    if (txt.trim()) {
                        await sendToSupabase(txt);
                    } else {
                        st.innerText = "❌ No se detectó texto.";
                    }
                } else {
                    st.innerText = "⚠️ Error: " + res.ErrorMessage;
                }
            } catch (e) {
                st.innerText = "⚠️ Error de red.";
            }
        }

        async function sendToSupabase(txt) {
            const st = document.getElementById('st');
            const { error } = await _supabase.from('POSTS').insert([
                { Alias: user.alias, Pfp: user.pfp, Body: txt }
            ]);
            if (error) st.innerText = "❌ Error Supabase.";
            else {
                st.innerText = "✅ ¡ENVIADO!";
                setTimeout(() => st.innerText = "Listo, we.", 2000);
            }
        }

        function initRealtime() {
            _supabase.channel('public:POSTS')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'POSTS' }, payload => {
                const p = payload.new;
                const html = `
                    <div class="post">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${p.Pfp}" style="width:25px; height:25px; border-radius:50%; border:1px solid var(--neon);">
                            <b style="color:var(--neon)">${p.Alias}</b>
                        </div>
                        <div style="background:#000; padding:12px; border-radius:8px; font-size:0.9rem; white-space:pre-wrap;">${p.Body}</div>
                        <button class="btn-sec" style="width:auto; padding:5px 15px;" onclick="copyTxt(\`${p.Body.replace(/`/g, "'")}\`)">COPIAR</button>
                    </div>
                `;
                const feed = document.getElementById('feed');
                if(feed.innerText.includes("Esperando")) feed.innerHTML = "";
                feed.innerHTML = html + feed.innerHTML;
            }).subscribe();
        }

        function copyTxt(t) {
            navigator.clipboard.writeText(t);
            alert("Copiado, we.");
        }

        function setProfile() {
            const a = prompt("Apodo:", user.alias);
            if(a) { 
                user.alias = a; 
                localStorage.setItem('it_user', JSON.stringify(user));
                location.reload();
            }
        }
    </script>
</body>
</html>
