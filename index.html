<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info truck</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2fe; --bg: #0a0c10; --card: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; width: 100%; max-width: 450px; backdrop-filter: blur(10px); box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 15px; background: #000; margin-bottom: 10px; border: 1px solid #333; }
        button { background: linear-gradient(45deg, #00f2fe, #4facfe); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; color: #000; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .secondary { background: transparent; border: 1px solid var(--neon); color: var(--neon); }
        .post { background: rgba(255,255,255,0.03); border-left: 4px solid var(--neon); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; width: 100%; box-sizing: border-box; animation: slideIn 0.3s ease; }
        .hidden { display: none !important; }
        .nav-pfp { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); cursor: pointer; background: #222; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="view-scanner" class="container hidden">
        <img id="nav-pfp" class="nav-pfp" src="https://via.placeholder.com/40" onclick="setProfile()">
        <div class="card">
            <h2 style="color:var(--neon); margin-top:0; font-size: 1.2rem;">SCANNER MODE</h2>
            <video id="vid" autoplay playsinline></video>
            <button onclick="doOCR()">📸 ESCANEAR Y ENVIAR</button>
            <p id="st" style="font-size: 0.7rem; color: #888; text-align: center; margin-top: 15px;">Sistema listo, we.</p>
        </div>
    </div>

    <div id="view-pc" class="container hidden">
        <div class="card" style="max-width: 600px;">
            <h2 style="color:var(--neon); margin-top:0; font-size: 1.2rem;">INFO TRUCK RECEPCIÓN</h2>
            <div id="feed">
                <p style="color: #666; text-align: center;">Esperando señales del cel...</p>
            </div>
        </div>
    </div>

    <script>
        // --- PEGA TUS LLAVES AQUÍ WE ---
        const SB_URL = 'https://dopmsepmgmcncpymkeey.supabase.co';
        const SB_KEY = 'sb_publishable_DQuJP12R60iDQCFtyW8xNQ_2i3HLC5x';
        
        // Inicializar Supabase
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const isPC = urlParams.get('mode') === 'pc';
        let user = JSON.parse(localStorage.getItem('it_user') || '{"alias":"Anon","pfp":"https://www.gravatar.com/avatar/0?d=mp"}');

        // Lógica de inicio
        if (isPC) {
            document.getElementById('view-pc').classList.remove('hidden');
            initRealtime();
        } else {
            document.getElementById('view-scanner').classList.remove('hidden');
            document.getElementById('nav-pfp').src = user.pfp;
            startCamera();
        }

        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('vid').srcObject = s;
            } catch (e) {
                alert("Oye we, activa el permiso de la cámara o usa HTTPS.");
            }
        }

        async function doOCR() {
            const st = document.getElementById('st');
            const vid = document.getElementById('vid');
            st.innerText = "⚡ PROCESANDO IMAGEN...";
            
            const canvas = document.createElement('canvas');
            canvas.width = vid.videoWidth; canvas.height = vid.videoHeight;
            canvas.getContext('2d').drawImage(vid, 0, 0);

            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'lat');
                
                if(text.trim()) {
                    st.innerText = "📤 SUBIENDO A LA NUBE...";
                    const { error } = await _supabase.from('POSTS').insert([
                        { Alias: user.alias, Pfp: user.pfp, Body: text }
                    ]);
                    
                    if(error) throw error;
                    st.innerText = "✅ ¡ENVIADO CON ÉXITO!";
                    setTimeout(() => st.innerText = "Listo para el siguiente.", 2000);
                } else {
                    st.innerText = "❌ No detecté texto, we.";
                }
            } catch (err) {
                console.error(err);
                st.innerText = "⚠️ Falló el envío.";
            }
        }

        function initRealtime() {
            _supabase.channel('posts-live')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'POSTS' }, payload => {
                const p = payload.new;
                const html = `
                    <div class="post">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${p.Pfp}" style="width:25px; height:25px; border-radius:50%; border: 1px solid var(--neon);">
                            <b style="color:var(--neon)">${p.Alias}</b>
                            <span style="font-size:0.6rem; color:#444;">${new Date().toLocaleTimeString()}</span>
                        </div>
                        <div style="background:rgba(0,0,0,0.4); padding:12px; border-radius:8px; font-size:0.95rem; white-space: pre-wrap;">${p.Body}</div>
                        <button class="secondary" style="padding:8px; font-size:0.7rem; margin-top:10px;" onclick="copyTxt('${p.Body.replace(/\n/g, ' ')}')">COPIAR PARA WORD</button>
                    </div>
                `;
                const feed = document.getElementById('feed');
                if(feed.innerHTML.includes("Esperando")) feed.innerHTML = "";
                feed.innerHTML = html + feed.innerHTML;
            }).subscribe();
        }

        function copyTxt(t) {
            navigator.clipboard.writeText(t);
            alert("¡Copiado, we! Ya puedes pegarlo.");
        }

        function setProfile() {
            const a = prompt("Ponte un alias mamalón:", user.alias);
            if(a) { 
                user.alias = a; 
                localStorage.setItem('it_user', JSON.stringify(user));
                location.reload();
            }
        }
    </script>
</body>
</html>
